name: CI-CD

on:
  push:
    branches: [main]

env:
  REGISTRY: demcheek3

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: set_tag
        run: |
          IMAGE_TAG=${GITHUB_SHA:0:7}
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -t $REGISTRY/crm-backend:${GITHUB_SHA::7} .
          docker tag $REGISTRY/crm-backend:${GITHUB_SHA::7} $REGISTRY/crm-backend:latest

      - name: Build frontend image
        run: |
          docker build -t $REGISTRY/crm-frontend:${GITHUB_SHA::7} ./frontend
          docker tag $REGISTRY/crm-frontend:${GITHUB_SHA::7} $REGISTRY/crm-frontend:latest

      - name: Push images
        run: |
          docker push $REGISTRY/crm-backend:${GITHUB_SHA::7}
          docker push $REGISTRY/crm-backend:latest
          docker push $REGISTRY/crm-frontend:${GITHUB_SHA::7}
          docker push $REGISTRY/crm-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}

        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/app/simpleshop

            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}

            sudo docker compose pull
            sudo docker compose up -d